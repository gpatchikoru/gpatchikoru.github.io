<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<meta name="description" content="Girishkumar Patchikoru. New site coming soon.">
<meta name="robots" content="noindex">
<title>Girishkumar Patchikoru</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0f14; --text:#d8e0ea; --text-strong:#f2f6fb; --muted:#8593a4;
    --primary:#36d6c3; --line:#222d3b;
    --display:"Space Grotesk",system-ui,sans-serif;
    --mono:"JetBrains Mono",ui-monospace,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:var(--bg);color:var(--text);font-family:var(--mono);
    min-height:100vh;display:grid;place-items:center;text-align:center;padding:28px;
    -webkit-font-smoothing:antialiased;overflow:hidden;
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(800px 500px at 50% 0%, rgba(54,214,195,.08), transparent 60%);
  }
  .card{position:relative;z-index:1;max-width:520px}
  .status{
    font-size:.74rem;letter-spacing:.12em;color:var(--primary);
    text-transform:lowercase;margin-bottom:22px;display:inline-flex;gap:.55em;align-items:center;
  }
  .status .blink{width:8px;height:8px;border-radius:50%;background:var(--primary);animation:pulse 1.6s ease-in-out infinite}
  h1{font-family:var(--display);font-weight:700;letter-spacing:-.02em;color:var(--text-strong);font-size:clamp(2rem,7vw,3.1rem);line-height:1.05}
  .line{color:var(--muted);font-size:.92rem;margin-top:16px}
  .cursor{display:inline-block;width:9px;height:1.05em;background:var(--primary);margin-left:4px;vertical-align:-2px;animation:pulse 1.1s steps(1) infinite}
  .link{
    display:inline-block;margin-top:34px;font-size:.82rem;font-weight:500;color:var(--bg);
    background:var(--primary);padding:11px 20px;border-radius:8px;text-decoration:none;
    transition:transform .2s, box-shadow .2s;
  }
  .link:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(54,214,195,.26)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
  <div class="card">
    <span class="status"><span class="blink"></span>building in progress</span>
    <h1>Girishkumar Patchikoru<span class="cursor"></span></h1>
    <p class="line">New site coming soon.</p>
  </div>
</body>
</html>
